<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College event registration</title>
</head>
<body>
    <h1>College Event Registration</h1>
    <form action="">
        <label for="name">Your Name:</label>
        <input type="text" id="name"><br><br>
        <label for="mail">Email:</label>
        <input type="email" id="mail"><br><br>
        <label for="age">Age:</label>
        <input type="number" id="age"><br><br>
        <p>Select Event Category:</p>
        <input type="checkbox" id="code">
        <label for="code">Coding Hackathon</label><br>
        <input type="checkbox" id="debate">
        <label for="debate">Debate Competition</label><br>
        <input type="checkbox" id="sport">
        <label for="sport"> Sports Tournament</label><br><br>
        <label for="date">Event Date</label>
        <input type="date" id="date"><br><br>
        <label for="slot">Preferred time slot:</label>
        <input type="time"><br><br>
        <button type="submit">Register Now</button>
    </form>
</body>
</html>
