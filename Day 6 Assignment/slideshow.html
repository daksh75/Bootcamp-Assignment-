<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow</title>

    <style>

        body{
            text-align:center;
            font-family: Arial, sans-serif;

            background: linear-gradient(
                135deg,
                #dfe9f3,
                #ffffff
            );

            min-height:100vh;
            padding-top:30px;
        }



        h1{

            font-size:40px;

            color:#333;

            text-shadow:
            2px 3px 5px rgba(0,0,0,0.2);

        }



        img{

            width:600px;
            height:400px;

            object-fit:cover;

            border-radius:20px;


            border:8px solid rgba(255,255,255,0.6);



            box-shadow:

            0 20px 40px rgba(0,0,0,0.25),

            0 0 25px rgba(0,150,255,0.4);



            transition:0.4s;

        }



        img:hover{

            transform:scale(1.03);


            box-shadow:

            0 25px 50px rgba(0,0,0,0.35),

            0 0 35px rgba(0,150,255,0.6);

        }




        button{


            padding:12px 25px;


            margin:12px;


            font-size:18px;


            cursor:pointer;


            border:none;


            border-radius:15px;



            background:linear-gradient(

                145deg,

                #ffffff,

                #d8e4ef

            );



            color:#333;



            box-shadow:


            8px 8px 15px rgba(0,0,0,0.25),


            -5px -5px 10px rgba(255,255,255,0.8);



            transition:0.2s;


        }





        button:hover{


            transform:translateY(-5px);



            box-shadow:


            10px 12px 20px rgba(0,0,0,0.3),


            -5px -5px 12px white;



        }





        button:active{


            transform:


            translateY(3px)

            scale(0.95);



            box-shadow:


            3px 3px 8px rgba(0,0,0,0.3),


            inset -3px -3px 8px rgba(255,255,255,0.6);


        }



    </style>

</head>


<body>


    <h1>Image Slideshow</h1>


    <img id="slide" src="https://picsum.photos/id/1/600/400">


    <br>


    <button onclick="previous()">Previous</button>

    <button onclick="next()">Next</button>


    <br>


    <button onclick="start()">Start Slideshow</button>

    <button onclick="stop()">Stop Slideshow</button>





<script>


let images = [

"https://picsum.photos/id/1/600/400",
"https://picsum.photos/id/2/600/400",
"https://picsum.photos/id/3/600/400",
"https://picsum.photos/id/4/600/400",
"https://picsum.photos/id/5/600/400",
"https://picsum.photos/id/6/600/400",
"https://picsum.photos/id/7/600/400",
"https://picsum.photos/id/8/600/400",
"https://picsum.photos/id/9/600/400",
"https://picsum.photos/id/10/600/400",
"https://picsum.photos/id/11/600/400",
"https://picsum.photos/id/12/600/400",
"https://picsum.photos/id/13/600/400",
"https://picsum.photos/id/14/600/400",
"https://picsum.photos/id/15/600/400",
"https://picsum.photos/id/16/600/400",
"https://picsum.photos/id/17/600/400",
"https://picsum.photos/id/18/600/400",
"https://picsum.photos/id/19/600/400",
"https://picsum.photos/id/20/600/400"

];



let index = 0;


let img = document.querySelector("#slide");


let timer = null;




function start(){


    if(timer != null){

        return;

    }



    timer = setInterval(function(){


        index++;


        if(index == images.length){

            index = 0;

        }


        img.src = images[index];


    },2000)



}





function stop(){


    clearInterval(timer);


    timer = null;


}






function next(){


    stop();



    index++;


    if(index == images.length){

        index = 0;

    }



    img.src = images[index];


}







function previous(){


    stop();



    index--;


    if(index < 0){


        index = images.length-1;


    }



    img.src = images[index];


}




</script>


</body>
</html>
